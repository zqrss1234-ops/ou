name: Build YLTool

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          sudo mkdir -p /opt/theos
          sudo chown -R $USER:admin /opt/theos
          git clone --recursive https://github.com/theos/theos.git /opt/theos
          echo "THEOS=/opt/theos" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          brew install dpkg ldid

      - name: Build & Package
        run: |
          export THEOS=/opt/theos
          make clean 2>/dev/null || true
          make package

      - name: Verify .deb and extract dylib
        run: |
          set -e
          DEB=$(ls packages/*.deb 2>/dev/null | head -1)
          if [ -z "$DEB" ] || [ ! -f "$DEB" ]; then
            echo "=== ERROR: no .deb found ==="
            exit 1
          fi
          echo "=== Found .deb: $DEB ==="
          mkdir -p /tmp/extract .theos/obj
          dpkg-deb -R "$DEB" /tmp/extract
          DYLIB=$(find /tmp/extract -name "YLTool.dylib" -type f)
          if [ -z "$DYLIB" ]; then
            echo "=== ERROR: dylib not found inside .deb ==="
            exit 1
          fi
          cp "$DYLIB" .theos/obj/YLTool.dylib
          echo "=== dylib extracted successfully ==="
          ls -la .theos/obj/YLTool.dylib
          file .theos/obj/YLTool.dylib
          rm -rf /tmp/extract

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: YLTool
          path: |
            .theos/obj/YLTool.dylib
            packages/*.deb

      - name: Create/Update Release
        run: |
          TAG="v1.0.0"
          DYLIB=".theos/obj/YLTool.dylib"
          DEB=$(ls packages/*.deb 2>/dev/null | head -1)
          gh release create "$TAG" \
            "$DYLIB#YLTool.dylib" \
            "$DEB#YLTool.deb" \
            --title "YLTool v1.0.0" \
            --notes "Auto-built with Theos.\narm64 + arm64e.\nAll issues fixed from the root." \
            --repo "${{ github.repository }}" 2>/dev/null \
          || \
          gh release upload "$TAG" \
            "$DYLIB#YLTool.dylib" \
            "$DEB#YLTool.deb" \
            --repo "${{ github.repository }}" \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
