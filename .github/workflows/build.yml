name: Build YLTool

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          sudo mkdir -p /opt/theos
          sudo chown -R $USER:admin /opt/theos
          git clone --recursive https://github.com/theos/theos.git /opt/theos
          echo "THEOS=/opt/theos" >> $GITHUB_ENV

      - name: Install ldid
        run: |
          brew install libplist
          git clone https://github.com/opa334/ldid.git /tmp/ldid
          cd /tmp/ldid
          make -j$(sysctl -n hw.logicalcpu)
          sudo cp ldid /usr/local/bin/ldid

      - name: Build Tweak
        run: |
          export THEOS=/opt/theos
          make

      - name: Sign dylib
        run: |
          DYLIB=".theos/obj/debug/YLTool.dylib"
          if [ -f "$DYLIB" ]; then
            ldid -Sentitlements.plist "$DYLIB"
            echo "=== Signed successfully ==="
            ls -la "$DYLIB"
          else
            echo "=== dylib not found ==="
            find .theos -name "*.dylib" -type f
            exit 1
          fi

      - name: Package .deb
        run: |
          export THEOS=/opt/theos
          make package

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: YLTool
          path: |
            .theos/obj/debug/YLTool.dylib
            packages/*.deb

      - name: Create/Update Release
        run: |
          TAG="v1.0.0"
          DYLIB=".theos/obj/debug/YLTool.dylib"
          DEB=$(ls packages/*.deb 2>/dev/null | head -1)

          gh release create "$TAG" \
            "$DYLIB#YLTool.dylib" \
            "$DEB#YLTool.deb" \
            --title "YLTool v1.0.0" \
            --notes "Auto-built and signed with ldid.\nCompatible with YallaLite (com.yalla.yallalite).\narm64 + arm64e." \
            --repo "${{ github.repository }}" 2>/dev/null \
          || \
          gh release upload "$TAG" \
            "$DYLIB#YLTool.dylib" \
            "$DEB#YLTool.deb" \
            --repo "${{ github.repository }}" \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
