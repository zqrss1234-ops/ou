name: Build YLTool

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          sudo mkdir -p /opt/theos
          sudo chown -R $USER:admin /opt/theos
          git clone --recursive https://github.com/theos/theos.git /opt/theos
          echo "THEOS=/opt/theos" >> $GITHUB_ENV

      - name: Install ldid
        run: |
          brew install libplist
          git clone https://github.com/opa334/ldid.git /tmp/ldid
          cd /tmp/ldid
          make -j$(sysctl -n hw.logicalcpu)
          sudo cp ldid /usr/local/bin/ldid

      - name: Build
        run: |
          export THEOS=/opt/theos
          make

      - name: Package .deb
        run: |
          export THEOS=/opt/theos
          make package

      - name: Sign dylib + deb
        run: |
          DYLIB=".theos/obj/debug/YLTool.dylib"
          DEB=$(ls packages/*.deb 2>/dev/null | head -1)

          # Sign the raw dylib
          if [ -f "$DYLIB" ]; then
            ldid -Sentitlements.plist "$DYLIB"
            echo "=== Raw dylib signed ==="
          fi

          # Sign the dylib inside the .deb
          if [ -n "$DEB" ] && [ -f "$DEB" ]; then
            mkdir -p /tmp/deb_extract
            dpkg-deb -R "$DEB" /tmp/deb_extract
            INNER_DYLIB=$(find /tmp/deb_extract -name "YLTool.dylib" -type f)
            if [ -n "$INNER_DYLIB" ]; then
              cp "$DYLIB" "$INNER_DYLIB"
              ldid -Sentitlements.plist "$INNER_DYLIB"
              dpkg-deb -b /tmp/deb_extract "$DEB"
              echo "=== .deb resign complete ==="
            fi
            rm -rf /tmp/deb_extract
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: YLTool
          path: |
            .theos/obj/debug/YLTool.dylib
            packages/*.deb

      - name: Create/Update Release
        run: |
          TAG="v1.0.0"
          DYLIB=".theos/obj/debug/YLTool.dylib"
          DEB=$(ls packages/*.deb 2>/dev/null | head -1)

          gh release create "$TAG" \
            "$DYLIB#YLTool.dylib" \
            "$DEB#YLTool.deb" \
            --title "YLTool v1.0.0" \
            --notes "Auto-built and signed with ldid.\narm64 + arm64e.\nBackground task keeps app alive when minimized like BacRunner." \
            --repo "${{ github.repository }}" 2>/dev/null \
          || \
          gh release upload "$TAG" \
            "$DYLIB#YLTool.dylib" \
            "$DEB#YLTool.deb" \
            --repo "${{ github.repository }}" \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
